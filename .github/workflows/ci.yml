name: CI

# ---------------------------------------------------------------------------
# What triggers this workflow
#
#   push            - every push to master / dev / phase3_revisions, and to any
#                     branch whose name starts with "phase" or "m1"/"m2".
#   pull_request    - every PR that targets master or dev. This is the gate that
#                     matters: a red PR check means "do not merge".
#   workflow_dispatch - manual run from the Actions tab (pick a branch, press
#                     "Run workflow"). Use this to re-run after fixing a flake,
#                     or to check a branch that the filters above skip.
#
# Full documentation, including how to read the output: docs/CI.md
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - master
      - dev
      - 'phase*'
      - 'm1*'
      - 'm2*'
  pull_request:
    branches:
      - master
      - dev
  workflow_dispatch:

# Cancel an in-progress run if the same branch is pushed again — the older run's
# result is stale the moment new commits land.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================================================================
  # JOB 1 — lint
  # Every .php file in the repo must parse under PHP 8.3 (the production
  # runtime). This catches syntax errors before they reach a page that is only
  # exercised by hand. Vendored libraries are linted too: a vendored file that
  # does not parse is just as broken as one of ours.
  # =========================================================================
  lint:
    name: PHP lint (8.3)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Show PHP version
        run: php -v

      - name: php -l every PHP file
        run: bash .github/ci/lint.sh

  # =========================================================================
  # JOB 2 — schema
  # Loads BOTH install schemas against BOTH supported engines. This is the
  # check that exists because of the utf8mb4_0900_ai_ci incident: a schema that
  # loads on MySQL and not MariaDB (or vice versa) is a release blocker, and we
  # used to find that out by hand.
  #
  # The database is deliberately given a NON-DEFAULT name. The installer lets
  # the operator name the colony DB (M1-H), so CI proves the schema does not
  # secretly depend on being called "animalbook".
  # =========================================================================
  schema:
    name: Schema load — ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false   # if MariaDB fails, still find out whether MySQL does too
      matrix:
        include:
          - label: MariaDB 10.11
            image: mariadb:10.11
            client: mariadb
          - label: MySQL 8.0
            image: mysql:8.0
            client: mysql

    services:
      db:
        image: ${{ matrix.image }}
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pw
          MARIADB_ROOT_PASSWORD: ci_root_pw
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized || mysqladmin ping -h 127.0.0.1 -uroot -pci_root_pw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Install client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mysql-client

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            mysql -h 127.0.0.1 -P 3306 -uroot -pci_root_pw -e "SELECT 1" >/dev/null 2>&1 && exit 0
            sleep 2
          done
          echo "::error::database service never became reachable"
          exit 1

      - name: Load schemas and run conformance checks
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: root
          DB_PASS: ci_root_pw
          DB_LABEL: ${{ matrix.label }}
        run: bash .github/ci/check_schema.sh

  # =========================================================================
  # JOB 3 — migrations
  # Proves the property the whole migration design rests on:
  #
  #   a FRESH install (starter SQL) and an UPGRADED install (older starter SQL
  #   + migrations) must end up with the SAME schema.
  #
  # If they drift apart, new installs and upgraded installs quietly become
  # different products — a bug reproduces on one and not the other, and nobody
  # can work out why. That is a slow, silent, miserable failure. This makes it
  # loud, on every pull request.
  #
  # Also asserts idempotence: applying migrations twice must be a no-op the
  # second time. Convergence is what makes it safe to re-run after a partial
  # failure, so it is not optional.
  # =========================================================================
  migrations:
    name: Migrations — ${{ matrix.label }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: MariaDB 10.11
            image: mariadb:10.11
          - label: MySQL 8.0
            image: mysql:8.0

    services:
      db:
        image: ${{ matrix.image }}
        env:
          MYSQL_ROOT_PASSWORD: ci_root_pw
          MARIADB_ROOT_PASSWORD: ci_root_pw
        ports:
          - 3306:3306

    steps:
      - uses: actions/checkout@v4

      - name: Ensure a database client is present
        run: |
          if ! command -v mysql >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client
          fi
          mysql --version

      - name: Wait for ${{ matrix.label }}
        env:
          MYSQL_PWD: ci_root_pw
        run: |
          for i in $(seq 1 60); do
            mysql --protocol=TCP -h 127.0.0.1 -P 3306 -uroot -e "SELECT VERSION();" 2>/dev/null && exit 0
            sleep 2
          done
          echo "::error::${{ matrix.label }} never accepted connections"
          docker ps -a || true
          exit 1

      - name: Migrate the frozen v0 schema forward, then verify it matches a fresh install
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASS: ci_root_pw
          MYSQL_PWD: ci_root_pw
        run: |
          set -e
          for kind in colony userbook; do
            case $kind in
              colony)   fixture=tests/fixtures/schema_v0_colony.sql;   db=ci_mig_colony ;;
              userbook) fixture=tests/fixtures/schema_v0_userbook.sql; db=ci_mig_userbook ;;
            esac

            echo "=== ${kind}: v0 fixture -> migrations -> compare against current starter ==="
            mysql --protocol=TCP -h 127.0.0.1 -uroot -e "DROP DATABASE IF EXISTS $db; CREATE DATABASE $db;"
            mysql --protocol=TCP -h 127.0.0.1 -uroot "$db" < "$fixture"

            echo "--- apply migrations to the OLD schema ---"
            ./mb_migrate.sh --db "$db" apply --yes

            echo "--- idempotence: a second apply must be a no-op ---"
            ./mb_migrate.sh --db "$db" apply --yes | tee /tmp/second.txt
            grep -q "pending: 0" /tmp/second.txt || {
              echo "::error::migrations are not idempotent on ${kind}"; exit 1; }

            echo "--- convergence: migrated-old must equal fresh-install ---"
            # mb_schema_check builds its reference from the CURRENT starter SQL
            # plus migrations. So this compares:
            #     (v0 + migrations)  vs  (current starter + migrations)
            # If someone edits the starter schema and forgets the migration, these
            # diverge and the build goes red. That is the entire point.
            ./mb_schema_check.sh --db "$db" --kind "$kind"

            mysql --protocol=TCP -h 127.0.0.1 -uroot -e "DROP DATABASE $db;"
          done

      - name: Charset guard regression test (seeded with REAL rows)
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: '3306'
          DB_USER: root
          DB_PASS: ci_root_pw
          MYSQL_PWD: ci_root_pw
        run: |
          set -e
          # This test exists because the guard once passed by testing NOTHING:
          # the latin1 tables were empty, so COUNT(*) was 0 regardless of whether
          # the predicate worked. It did not -- it flagged plain ASCII like
          # "Mating : MN9 : 1" as non-ASCII. A guard must be tested WITH ROWS.
          q() { mysql --protocol=TCP -h 127.0.0.1 -uroot -N -B "$@"; }

          echo "--- case 1: latin1 columns holding ASCII (must be SAFE) ---"
          q -e "DROP DATABASE IF EXISTS ci_cg_ok; CREATE DATABASE ci_cg_ok;"
          q ci_cg_ok < mousebook_userbook_install_schema.sql
          q ci_cg_ok -e "INSERT INTO userdetail (user_idno,user_email) VALUES (1,'ward.chris.s@gmail.com');"
          q ci_cg_ok -e "INSERT INTO userpass (user_idno,user_name,user_pass) VALUES (1,'chris','\$2y\$10\$z.4gXw8N0zBtRUHd4ateQeTtFzq9kUjE4gm3hm8mpb4Xt58hyMiAS');"
          rows=$(q ci_cg_ok -e "SELECT COUNT(*) FROM userdetail;")
          [ "$rows" = "1" ] || { echo "::error::seed failed - the test would prove nothing"; exit 1; }
          ./mb_migrate.sh --db ci_cg_ok preflight || {
            echo "::error::FALSE POSITIVE - guard flagged pure-ASCII data as unsafe"; exit 1; }

          echo "--- case 2: a genuinely double-encoded value (must be UNSAFE) ---"
          q -e "DROP DATABASE IF EXISTS ci_cg_bad; CREATE DATABASE ci_cg_bad;"
          q ci_cg_bad < mousebook_userbook_install_schema.sql
          mysql --protocol=TCP -h 127.0.0.1 -uroot --default-character-set=latin1 ci_cg_bad \
            -e "INSERT INTO userdetail (user_idno,user_email) VALUES (1, CONCAT(CHAR(77),CHAR(195),CHAR(188),CHAR(108)));"
          hex=$(q ci_cg_bad -e "SELECT HEX(user_email) FROM userdetail;")
          [ "$hex" = "4DC3BC6C" ] || { echo "::error::seed failed (hex=$hex)"; exit 1; }
          if ./mb_migrate.sh --db ci_cg_bad preflight; then
            echo "::error::FALSE NEGATIVE - guard missed double-encoded data"; exit 1
          fi
          echo "guard correctly refused the double-encoded database"

          q -e "DROP DATABASE ci_cg_ok; DROP DATABASE ci_cg_bad;"
